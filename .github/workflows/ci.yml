name: CI - Testar aplicação

on:
  push:
    branches: [ main, feature-testes ]
  pull_request:
    branches: [ main ]
    

jobs:
  build:

    runs-on: ubuntu-latest


    steps:
    - name: Baixar código
      uses: actions/checkout@v3


    - name: Instalar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'


    - name: Instalar dependências
      run: |
        pip install pytest


    - name: Rodar testes
      run: |
        pytest